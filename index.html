<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ticker News & Météo Temps Réel - Pitit Manman Mari TV</title>
<style>
body {
  margin: 0;
  background: transparent;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  overflow: hidden;
}

/* Couleurs des mots-clés */
.highlight-red { color: #ff4d4d; text-transform: uppercase; font-weight: 800; }
.highlight-yellow { color: #ffcc00; text-transform: uppercase; font-weight: 800; }
.highlight-green { color: #2ecc71; font-weight: 800; }
.highlight-blue { color: #4da6ff; text-transform: uppercase; font-weight: 800; }
.highlight-orange { color: #ff9500; text-transform: uppercase; font-weight: 800; }
.highlight-cyan { color: #00fbff; text-transform: uppercase; font-weight: 800; }
.highlight-planet { color: #9dff00; text-transform: uppercase; font-weight: 800; }
.highlight-war { color: #ff3333; font-weight: 900; text-decoration: underline; }

.container {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 30px;
  display: flex;
  align-items: center;
  background: rgba(10, 10, 10, 0.95);
  color: white;
  overflow: hidden;
  box-shadow: 0 -2px 15px rgba(0,0,0,0.5);
  border-top: 3px solid #ff0000;
}

.info-box {
  background: #cc0000;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  width: 90px;
  font-weight: 600;
  font-size: 18px;
  clip-path: polygon(0 0, 85% 0, 100% 100%, 0% 100%);
  flex-shrink: 0;
}


.weather-box {
  background: #1835db;
  height: 100%;
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-weight: 700;
  font-size: 12px;
  border-left: 2px solid #1569d6;
  z-index: 10;
  width: 160px; /* Réduit de 220px à 160px */
  color: #ffcc00;
  justify-content: center;
  flex-shrink: 0;
}

.weather-content {
  display: flex;
  align-items: center;
  transition: opacity 0.4s ease-in-out;
}

.weather-icon {
  width: 22px;
  height: 22px;
  margin-right: 5px;
  filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
}

.text-area {
  position: relative;
  flex: 1;
  height: 100%;
  overflow: hidden;
  display: flex;
  align-items: center;
}

#newsText {
  position: absolute;
  left: 20px;
  font-size: 12px;
  white-space: nowrap; /* FORCE UNE SEULE LIGNE */
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.6s ease;
}

#newsText.active { opacity: 1; transform: translateY(0); }
#newsText.exit { opacity: 0; transform: translateY(-10px); }

@keyframes scrollLongText {
  0%, 15% { transform: translateX(0); }
  85%, 100% { transform: translateX(var(--scroll-dist)); }
}

.animate-scroll { animation: scrollLongText var(--duration) linear forwards; }
</style>
</head>
<body>

<div class="container">
  <div class="info-box">INFO</div>
  
  <div class="text-area" id="tickerZone">
    <div id="newsText">Lancement du flux mondial (Haïti - Mali - UK - Monde)...</div>
  </div>

  <div class="weather-box">
    <div id="weatherContent" class="weather-content">
        <img id="wIcon" class="weather-icon" src="" style="display:none;">
        <span id="temp">--°C</span>
    </div>
  </div>
</div>

<script>
// --- CONFIGURATION METEO ---
const API_KEY = "e7a735f3ae4e43acbcf164503262904"; 
const locations = [
    { city: "Port-au-Prince", label: "HAÏTI" },
    { city: "London", label: "UK" },
    { city: "Miami", label: "USA" },
    { city: "Montreal", label: "CANADA" }
];
let locIndex = 0;

async function updateWeather() {
    const loc = locations[locIndex];
    const weatherContent = document.getElementById("weatherContent");
    try {
        const response = await fetch(`https://api.weatherapi.com/v1/current.json?key=${API_KEY}&q=${loc.city}&lang=fr&aqi=no&v=${Date.now()}`);
        const data = await response.json();
        weatherContent.style.opacity = "0";
        setTimeout(() => {
            const currentTemp = data.current.temp_c;
            document.getElementById("temp").innerHTML = `
                <span style="color:#aaa; font-size:9px;">${loc.city.toUpperCase()}</span> 
                <span style="margin-left:5px; color:#ffcc00;">${Math.round(currentTemp)}°C</span>
            `;
            const icon = document.getElementById("wIcon");
            icon.src = "https:" + data.current.condition.icon;
            icon.style.display = "block";
            weatherContent.style.opacity = "1";
        }, 400);
        locIndex = (locIndex + 1) % locations.length;
    } catch (error) { locIndex = (locIndex + 1) % locations.length; }
}
setInterval(updateWeather, 8000);
updateWeather();

// --- GESTION DES MESSAGES ---
let fixedMessages = [
  "BIENVENUE SUR LA RADIO TÉLÉ PITIT MANMAN MARI TV",
 "🔴 ACTIVITÉ : Pou nou kontinye mete men nan konstriksyon mezon pou Pè yo.",
                  "Fondasyon Fanmi Pitit Manman Mari ap enfòme nou tout ke lap òganize yon gran raf entènasyonal.",
                  "Pri biyè raf la se 25$ ameriken pou moun ki lòtbò e 2500 gdes pou moun ki Ayiti.",
                  "Tiraj la ap fèt jou dimanch 31 mai 2026 la, pou fèt manman yo.",
                  "1er prix : 5000$ US | 2e Prix : 3000$ US | 3e Prix : 1000$ US | 4e ak 5e Prix : 500$ US",
                  "📞 Rele nou nan: 44977975 | 561 562 3369 | 3825 1745 | 3901 0184",

                "🔴 ACTIVITÉ: DEPI 1E RIVE 31 ME 2026, chak maten a 6è, n'ap antre nan yon jounen lapriyè ak: ",
                  "Louwanj Marial – Moman Lapriyè – Lamès – Chaplè – Jèn – Adorasyon Sen Sakrèman – Chaplet Divin Mizèrikòd – Lapriyè Aswè.",
                  "SOTI 13 POU RIVE 21 ME, n'ap selebre yon nevèn espesyal pou Sent Rita",
                  "Avoka tout koz ki san espwa. Lamès nevèn yo ap fèt chak Jou a Midi.",
                  "Jou kap 22 Me a, n'ap selebre yon mès spesyal nan okazyon fèt Sent Rita.",
                  " Ou menm ki ta renmen rekòmande yon Lamès pandan tout mwa Me a, oswa si'w bezwen plis enfòmasyon, kontakte nou sou youn nan nimewo sa yo:",
                  " 2817-1063 | 3901-0184 | 305-501-2222 | 305-390-2828 | 786-319-4040",

 
                "🔴 ACTIVITÉ: NAN SÈLMAN 2 MWA, GWO RANDEVOU ESPIRITYÈL LA AP RIVE ",
                  "Pèlerinaj Entènasyonal Brezil - SOTI 29 JEN POU RIVE 9 JIYÈ 2026, nan pye Vyèj Nwa a, Manman Aparecida.",
                  "RELE NAN NIMEWO SA YO POU W PATISIPE AVÈK NOU. 44977975 | 3901-0184 | 561 562 3369 | 305-390-2828 | 38251745",


                "🔴 ACTIVITÉ: 17èm Konvansyon - Mouvman Karismatik Ayisyen nan Dyosèz PALM BEACH  ap fèt soti 10 JIYÈ RIVE  12 JIYÈ 2026.",
                  "Sou Tèm nan : < Vire do bay sa ki mal, fè byen; chèche lapè epi pouswiv li (Sòm 34:15).>",
                  "GWO PREDIKATÈ YO AP LA :",
                  "Evèk Manuel de Jesús Rodríguez, Evèk Pierre André Dumas ",         
                  "Pè Frantzy Petit-Homme, Pè Patrick Bernard, CS,",
                  "Pè Yves Geffrard, ak Dyak Job Casimir.",
                  "Animasyon : Carlens Bruny Frè GiGi, Bijou Jean, Siva Charlot, ak Chorale Notre Dame.",
                 " Orè yo : Vandredi 6è pou 10è aswè | Samdi 10è Dimaten pou 10è aswè ",
                 "Dimanch 9è dimaten pou 3è aprèmidi",
                 "Lokal la : Saint John Paul II Academy, 4001 N. Military Trail, Boca Raton, FL.",
                 "Pou plis enfòmasyon, rele Pè Yves nan: 772 971 9080.",

                "🔴 ACTIVITÉ: Soti 18 pou rive 26 jen - Nevèn Notre Dame du Perpétuel Secours | Pawas St Jérôme nan Brooklyn ",
                  "Sou Tèm : << Ak Manman Pepetyèl, Mirak la pral fèt pou Ayiti.>> ",
                 " Predikatè prensipal : Pè Frantzy Petit-Homme",
                 "Dimanch 27 jen, n ap selebre gran fèt Notre Dame du Perpétuel Secours nan Katedral Brooklyn.",

  "ABONNEZ-VOUS | PARTAGEZ | COMMENTEZ | AIMEZ"
];

let messages = [...fixedMessages];

async function fetchLiveNews() {
    const sources = [
        { name: "⛪ ÉGLISE", url: "https://www.vaticannews.va/fr.rss.xml" },
        { name: "🇭🇹 HAÏTI", url: "https://www.haitilibre.com/haitilibre.xml" },
        { name: "🌍 MALI", url: "https://www.malijet.com/rss.xml" },
        { name: "🇬🇧 UK", url: "https://news.google.com/rss/search?q=UK+news+fr&hl=fr&gl=FR&ceid=FR:fr" },
        { name: "🌍 MONDE", url: "https://www.france24.com/fr/rss" },
        { name: "📈 ÉCONOMIE", url: "https://www.latribune.fr/rss/economie.xml" },
        { name: "💻 TECH", url: "https://www.futura-sciences.com/rss/tech.xml" },
        { name: "🌱 PLANÈTE", url: "https://www.lemonde.fr/planete/rss_full.xml" },
        { name: "⚽ FOOT", url: "https://www.footmercato.net/feed/actualite" },
        { name: "🇭🇹 LE NOUVELLISTE", url: "https://lenouvelliste.com/rss.xml" },
        
        { name: "⚽ FOOT MERCATO", url: "https://www.footmercato.net/feed/actualite" },
        { name: "⚽ RMC SPORT", url: "https://rmcsport.bfmtv.com/rss/info/" },
        { name: "⚽ EUROSPORT", url: "https://www.eurosport.fr/rss.xml" },
        { name: "⚽ MAXIFOOT", url: "https://www.maxifoot.fr/rss.xml" },
        { name: "⚽ SPORT.FR", url: "https://www.sport.fr/feed/" },
        { name: "🇭🇹 LE QUOTIDIEN 509", url: "https://lequotidien509.com/feed" },
        
        /*{ name: "🇭🇹 HAITI LIBRE", url: "https://www.haitilibre.com/rss-flash-en.php" },*/
        /*{ name: "🇭🇹 REZO NÒDWÈS", url: "https://rezonodwes.com/?feed=rss2" },
        { name: "🇭🇹 HAITI LIBERTÉ", url: "https://haitiliberte.com/feed" },
        { name: "🇭🇹 HAITIAN TIMES", url: "https://haitiantimes.com/feed" },
        { name: "🇭🇹 HAITI24", url: "https://haiti24.net/feed" }*/
    ];

  let autoNews = [];

    for (let source of sources) {
        try {
            // Utilisation de rss2json pour éviter les blocages constatés dans image_b28efa.png
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(source.url)}&v=${Date.now()}`);
            const data = await res.json();
            if (data.items) {
                // On prend les 3 titres les plus récents par source
                data.items.slice(0, 3).forEach(item => {
                    autoNews.push(`${source.name} : ${item.title.toUpperCase()}`);
                });
            }
        } catch (e) { 
            console.error("Erreur sur la source : " + source.name); 
        }
    }

    // Mélange les nouvelles pour ne pas avoir tout le sport d'un coup
    autoNews.sort(() => Math.random() - 0.5); 
    
    // Garde le message de bienvenue en premier, puis les news, puis vos activités fixes
    messages = [fixedMessages[0], ...autoNews, ...fixedMessages.slice(1)];
}

let newsIndex = 0;
const newsText = document.getElementById("newsText");
const tickerZone = document.getElementById("tickerZone");

function highlightText(text) {
    return text
        .replace(/(Fondasyon Fanmi Pitit Manman Mari)/gi, '<span class="highlight-blue">$1</span>')
        .replace(/(HAITI|HAÏTI|MALI|UK|UK|ROYAUME-UNI|ACTIVITÉ|🔴 ACTUALITÉS|LIVE|URGENT)/gi, '<span class="highlight-red">$1</span>')
        .replace(/(GUERRE|CONFLIT|ATTAQUE|MORT|TUÉS|BOMBARDEMENT|SÉISME)/gi, '<span class="highlight-war">$1</span>')
        .replace(/(INTERNATIONALE|EGLISE|ÉGLISE|VATICAN|PAPE)/gi, '<span class="highlight-yellow">$1</span>')
        .replace(/(SPORT|MATCH|FOOTBALL|VICTOIRE|LIGUE|CHAMPIONS)/gi, '<span class="highlight-orange">$1</span>')
        .replace(/(TECH|IA|ROBOT|ESPACE|INNOVATION)/gi, '<span class="highlight-cyan">$1</span>')
        .replace(/(PLANÈTE|ÉCOLOGIE|CLIMAT|ENVIRONNEMENT)/gi, '<span class="highlight-planet">$1</span>')
        .replace(/(ECONOMIE|ÉCONOMIE|FINANCE|BOURSE|INFLATION)/gi, '<span class="highlight-blue">$1</span>')
        .replace(/(\d+[\$\sUSgdes]+)/gi, function(match) {
            if(match.includes('$') || match.includes('US') || match.includes('gdes')) {
                return '<span class="highlight-green">' + match + '</span>';
            }
            return match;
        })
        .replace(/(31 mai 2026)/gi, '<span class="highlight-yellow">$1</span>');
}

function startNewsCycle() {
  if (messages.length === 0) return;
  newsText.innerHTML = highlightText(messages[newsIndex]);
  newsText.classList.remove("exit", "animate-scroll");
  newsText.style.transform = ""; 
  
  setTimeout(() => {
    newsText.classList.add("active");
    setTimeout(() => {
      const zoneWidth = tickerZone.offsetWidth - 40;
      const textWidth = newsText.scrollWidth;
      if (textWidth > zoneWidth) {
        const diff = zoneWidth - textWidth - 50;
        const totalDuration = Math.max(Math.abs(diff) / 45, 6); 
        newsText.style.setProperty('--scroll-dist', `${diff}px`);
        newsText.style.setProperty('--duration', `${totalDuration}s`);
        newsText.classList.add("animate-scroll");
        setTimeout(nextMessage, (totalDuration + 1) * 1000);
      } else {
        setTimeout(nextMessage, 6000); 
      }
    }, 1000);
  }, 100);
}

function nextMessage() {
  newsText.classList.remove("active");
  newsText.classList.add("exit");
  setTimeout(() => {
    newsIndex = (newsIndex + 1) % messages.length;
    startNewsCycle();
  }, 700);
}

setInterval(fetchLiveNews, 900000);
setTimeout(() => { location.reload(); }, 3600000);

fetchLiveNews().finally(() => {
    startNewsCycle();
});
</script>
